<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>未授权</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      h1 {
        color: #2d3748;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .message {
        color: #4a5568;
        font-size: 18px;
        line-height: 1.8;
        margin-bottom: 30px;
      }
      .alert-type {
        background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 25px;
        display: inline-block;
        box-shadow: 0 4px 15px rgba(183, 121, 31, 0.4);
      }
      .details {
        background: #fffff0;
        border-left: 4px solid #d69e2e;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        border-radius: 0 10px 10px 0;
      }
      .details h3 {
        color: #2d3748;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: 600;
      }
      .details p {
        color: #718096;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
        color: white;
        padding: 12px 30px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        margin-top: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(183, 121, 31, 0.4);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(183, 121, 31, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
      </div>
      <h1>未授权</h1>
      <div class="alert-type">401 Unauthorized</div>
      <div class="message">抱歉，您需要提供有效的身份验证凭据才能访问此资源。</div>
      <div class="details">
        <h3>可能的原因</h3>
        <p>• 未登录或登录已过期</p>
        <p>• 身份验证凭据无效</p>
        <p>• 访问令牌已失效</p>
      </div>
      <a href="/" class="btn">返回首页</a>
    </div>
  </body>
</html>
