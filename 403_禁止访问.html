<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>禁止访问</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #38a169 0%, #276749 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #38a169 0%, #276749 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      h1 {
        color: #2d3748;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .message {
        color: #4a5568;
        font-size: 18px;
        line-height: 1.8;
        margin-bottom: 30px;
      }
      .alert-type {
        background: linear-gradient(135deg, #38a169 0%, #276749 100%);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 25px;
        display: inline-block;
        box-shadow: 0 4px 15px rgba(39, 103, 73, 0.4);
      }
      .details {
        background: #f0fff4;
        border-left: 4px solid #38a169;
        padding: 20px;
        margin-top: 25px;
        text-align: left;
        border-radius: 0 10px 10px 0;
      }
      .details h3 {
        color: #2d3748;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: 600;
      }
      .details p {
        color: #718096;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #38a169 0%, #276749 100%);
        color: white;
        padding: 12px 30px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        margin-top: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(39, 103, 73, 0.4);
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(39, 103, 73, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
      </div>
      <h1>禁止访问</h1>
      <div class="alert-type">403 Forbidden</div>
      <div class="message">抱歉，您没有权限访问此资源。</div>
      <div class="details">
        <h3>可能的原因</h3>
        <p>• 您的账户权限不足</p>
        <p>• 资源被管理员限制访问</p>
        <p>• IP 地址被限制</p>
      </div>
      <a href="/" class="btn">返回首页</a>
    </div>
  </body>
</html>
